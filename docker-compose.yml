# Arquivo de PRODUÇÃO (consumido pelo Coolify).
# Localmente, docker-compose.override.yml é carregado automaticamente em cima
# deste (adiciona bind mounts, Vite dev server, etc). No Coolify, apenas este
# arquivo é usado.

services:
  postgres:
    image: postgres:16-alpine
    # `missing` baixa a imagem se nao estiver no host. Evita erro
    # "No such image: postgres:16-alpine" quando o Coolify recria
    # containers e a imagem foi removida por prune/limpeza.
    pull_policy: missing
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onetask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onetask}
      POSTGRES_DB: ${POSTGRES_DB:-onetask}
      TZ: America/Fortaleza
    # Tunning para atender múltiplos workers do Uvicorn.
    # max_connections acomoda: N_workers × (pool_size + max_overflow) + folga admin.
    # shared_buffers ≈ 25% da RAM dedicada ao Postgres em EC2 pequena/média.
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - random_page_cost=1.1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onetask} -d ${POSTGRES_DB:-onetask}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    # Chromium (Playwright) crasha com "Target closed" se /dev/shm for muito
    # pequeno. Padrão do Docker é 64MB — subimos pra 1GB.
    shm_size: "1gb"
    # Em produção (Coolify) as variáveis vêm do painel.
    # Localmente o docker compose lê .env do diretório automaticamente.
    environment:
      PYTHONPATH: /app
      TZ: America/Fortaleza
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-onetask}:${POSTGRES_PASSWORD:-onetask}@postgres:5432/${POSTGRES_DB:-onetask}
      BATCH_WORKER_ENABLED: ${BATCH_WORKER_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_data:/app/data
      - api_output:/app/output
      # Volume compartilhado com ajus-runner em modo READ-ONLY pra que
      # o endpoint /ajus/classificacao/sessions/{id}/debug-screenshots
      # consiga servir os PNGs gerados pelo runner em caso de falha de login.
      - ajus_session:/app/data/ajus-session:ro
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  ajus-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: ajus-runner
    restart: unless-stopped
    # Chromium precisa de /dev/shm grande pra não travar.
    shm_size: "1gb"
    environment:
      PYTHONPATH: /app
      TZ: America/Fortaleza
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-onetask}:${POSTGRES_PASSWORD:-onetask}@postgres:5432/${POSTGRES_DB:-onetask}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Volume dedicado pros storage_state.json das contas. Cada conta
      # tem subdiretório `<account_id>/storage_state.json`. Precisa
      # sobreviver a restart do container pra reaproveitar sessão.
      - ajus_session:/app/data/ajus-session

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8111}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# Volumes blindados com external: true + nome configuravel via env var.
# Sem isso, Coolify pode recriar volumes ao detectar mudanca no compose,
# zerando o banco. Aconteceu em lab 2026-04-29.
#
# Os defaults apontam pros volumes REAIS de PROD (u800go80wk8kccg4sswowg08_*).
# Pra outros ambientes (lab, dev), basta sobrescrever no painel do Coolify
# as 4 env vars POSTGRES_VOLUME_NAME, API_DATA_VOLUME_NAME,
# API_OUTPUT_VOLUME_NAME, AJUS_SESSION_VOLUME_NAME apontando pros volumes
# do projeto naquele Coolify.
#
# Coolify normaliza _ (underscore) pra - (hifen) ao criar o volume fisico,
# por isso o "name" usa hifen mesmo as keys usando underscore.
volumes:
  postgres_data:
    external: true
    name: ${POSTGRES_VOLUME_NAME:-u800go80wk8kccg4sswowg08_postgres-data}
  api_data:
    external: true
    name: ${API_DATA_VOLUME_NAME:-u800go80wk8kccg4sswowg08_api-data}
  api_output:
    external: true
    name: ${API_OUTPUT_VOLUME_NAME:-u800go80wk8kccg4sswowg08_api-output}
  ajus_session:
    external: true
    name: ${AJUS_SESSION_VOLUME_NAME:-u800go80wk8kccg4sswowg08_ajus-session}
