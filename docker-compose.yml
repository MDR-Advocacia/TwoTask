services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER_NAME:-onetask-api}
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      TZ: America/Fortaleza
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/docker-test.db}
      BATCH_WORKER_ENABLED: ${BATCH_WORKER_ENABLED:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: ${FRONTEND_CONTAINER_NAME:-onetask-frontend}
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_URL: http://api:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
