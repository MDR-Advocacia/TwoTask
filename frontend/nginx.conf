server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml application/wasm image/svg+xml;

    # Limite generoso pra uploads de planilhas/PDFs.
    # Backend valida ate settings.prazos_iniciais_max_pdf_mb (default 200MB)
    # por arquivo; nginx tem ~10MB de folga pra overhead multipart. Pra
    # upload de muitos PDFs, o frontend faz N+1 requests sequenciais
    # (1 PDF por request) — nao precisa cobrir tamanho total.
    # Compressao pikepdf entra apos upload, reduzindo 15-40% no volume.
    client_max_body_size 210M;

    # Proxy de /api → backend FastAPI (mesma rede do docker-compose)
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        # Timeouts generosos: upload de PDF 200MB + compress pikepdf
        # (~30-60s) + ingest mecânico (~10-30s) pode chegar a 2-3 min.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Body upload timeout (cliente lento + PDF grande)
        client_body_timeout 600s;
    }

    # Healthcheck rápido direto do nginx
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Cache agressivo pros assets com hash do Vite
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — qualquer rota não encontrada vai pro index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
